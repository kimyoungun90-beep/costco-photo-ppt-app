<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>코스트코 진열·연출 점검 PPT 생성기</title>
<style>
:root{--bg:#f3f5f9;--line:#cfd7e6;--navy:#172033;--head:#d9d9d9;--txt:#111827;--muted:#667085;--blue:#1d4ed8}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Arial,'Malgun Gothic',sans-serif;color:var(--txt)}
header{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid var(--line);padding:14px 20px}h1{font-size:22px;margin:0}header p{margin:5px 0 0;color:var(--muted);font-size:13px}
main{max-width:1500px;margin:auto;padding:16px}.bar{display:grid;grid-template-columns:.6fr .7fr .7fr .7fr auto auto auto auto;gap:10px;align-items:end;background:#fff;border:1px solid var(--line);border-radius:15px;padding:14px;margin-bottom:12px}label{display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--muted);font-weight:800}input,select{height:38px;border:1px solid var(--line);border-radius:10px;padding:0 10px;font-size:14px}button{border:0;border-radius:10px;padding:11px 14px;font-weight:900;cursor:pointer;background:#eef2ff;color:#1e40af}button.primary{background:#111827;color:#fff}button.blue{background:var(--blue);color:#fff}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.tab{background:#fff;border:1px solid var(--line);border-radius:999px;padding:9px 14px;color:#334155}.tab.on{background:#172033;color:#fff}.notice{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:12px;padding:10px 12px;margin-bottom:12px;font-size:13px;line-height:1.5}.layout{display:grid;grid-template-columns:355px 1fr;gap:14px}.card{background:#fff;border:1px solid var(--line);border-radius:15px;overflow:hidden}.card h2{font-size:17px;margin:0;padding:14px;border-bottom:1px solid var(--line)}.body{padding:14px}.drop{min-height:135px;border:2px dashed #94a3b8;border-radius:15px;display:flex;align-items:center;justify-content:center;text-align:center;color:#667085;background:#f8fafc;margin-bottom:12px;cursor:pointer}.drop b{display:block;color:#111827;font-size:18px;margin-bottom:5px}.drop input{display:none}.pool{min-height:210px;max-height:390px;overflow:auto;border:2px dashed #d8dfeb;border-radius:12px;padding:10px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.empty{grid-column:1/-1;display:flex;align-items:center;justify-content:center;min-height:150px;color:#98a2b3;text-align:center;font-size:13px;line-height:1.5}.thumb{position:relative;aspect-ratio:1/1;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff;cursor:grab}.thumb img{width:100%;height:100%;object-fit:cover;display:block}.thumb .kb{position:absolute;left:4px;top:4px;background:#111827d9;color:#fff;border-radius:99px;font-size:10px;padding:2px 6px}.thumb .x{position:absolute;right:4px;top:4px;background:#dc2626;color:#fff;border-radius:99px;width:21px;height:21px;text-align:center;line-height:21px;font-weight:900}.sum{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.sum div{background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:9px}.sum span{display:block;color:#667085;font-size:11px}.sum b{font-size:15px}.status{font-size:13px;color:#667085;margin-top:10px;line-height:1.5}.prog{height:8px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin-top:8px}.prog div{height:100%;width:0;background:#2563eb}.previewHead{display:flex;justify-content:space-between;align-items:center;padding:13px 15px;border-bottom:1px solid var(--line);background:#fbfcff}.scene{display:flex;gap:7px;align-items:center}.stage{padding:16px;overflow:auto}.sheet{width:1200px;height:675px;background:#fff;border:1px solid #111;position:relative;overflow:hidden}.top{height:28px;background:var(--navy);color:#fff;display:flex;justify-content:space-between;align-items:center;padding:0 9px;font-weight:900}.top .store{font-size:23px;text-decoration:underline;text-underline-offset:3px}.top .ttl{font-size:16px}.grid{position:absolute;left:0;top:28px;width:100%;height:647px;border-collapse:collapse;table-layout:fixed}.grid th,.grid td{border:1.5px solid #222;text-align:center;vertical-align:middle;padding:0}.grid .lab{width:35.4px;background:var(--head);font-weight:900;font-size:13px}.grid .hd{height:43px;background:var(--head);font-weight:900;line-height:1.15}.grid .hd .m{font-size:11px}.grid .hd .s{font-size:10.5px;color:#1f5aa6;text-decoration:underline}.grid .photoLab{background:var(--head);font-weight:900;font-size:13px;white-space:pre-line}.grid .photoRow{height:154px}.grid .content{height:142px;background:#f3f3f3}.slot{height:154px;display:flex;align-items:center;justify-content:center;background:#fff;position:relative}.slot .thumb{width:142px;height:142px;border-radius:2px}.slot .thumb img{object-fit:cover}.slot .hint{color:#a3aab8;font-size:12px}.drag{outline:3px solid #93c5fd!important;background:#eff6ff!important}.printOnly{display:none}@media(max-width:1100px){.bar{grid-template-columns:1fr 1fr}.layout{grid-template-columns:1fr}.sheet{transform:scale(.75);transform-origin:top left}.stage{height:540px}}@media print{header,main{display:none!important}.printOnly{display:block}.printPage{width:29.7cm;height:16.706cm;margin:0 auto;page-break-after:always}.printPage .sheet{width:29.7cm;height:16.706cm;border:0}.printPage .top{height:.7cm}.printPage .grid{top:.7cm;height:16.006cm}@page{size:A4 landscape;margin:0}}
</style>
</head>
<body>
<header><h1>코스트코 진열·연출 점검 PPT 생성기</h1><p>담당 선택 → 점포 선택 → 사진 업로드 → 위치 배정 → PPT/PDF 생성</p></header>
<main>
<section class="bar">
<label>보고 주차<input id="week" value="W22"></label>
<label>담당<select id="mgr"></select></label>
<label>현재 점포<select id="store"></select></label>
<label>압축<select id="max"><option value="700">700px / 가볍게</option><option value="900" selected>900px / 추천</option><option value="1200">1200px / 선명</option></select></label>
<button onclick="autoPut()">대기사진 자동배치</button><button class="blue" onclick="printCurrent()">현재 PDF</button><button class="blue" onclick="printAll()">담당 전체 PDF</button><button class="primary" onclick="makePpt()">PPT 생성</button>
</section>
<div id="tabs" class="tabs"></div>
<div class="notice"><b>사진은 PPT에서 정확히 4cm × 4cm</b>로 들어갑니다. 한 품목당 한 장면에 3장까지 들어가며 4장째부터 다음 장면으로 넘어갑니다. 이 파일은 외부 라이브러리 없이 index.html 하나만 쓰는 버전입니다.</div>
<section class="layout">
<aside class="card"><h2>사진 대기함 <span id="info" style="font-size:12px;color:#667085"></span></h2><div class="body">
<label class="drop" id="drop"><input type="file" id="files" accept="image/*" multiple><span><b>사진을 여기에 넣기</b>드래그가 안 되면 클릭해서 선택<br>Ctrl+V 붙여넣기도 가능</span></label>
<div id="pool" class="pool"></div>
<div class="sum"><div><span>현재 점포 전체</span><b id="sAll">0장</b></div><div><span>배정 완료</span><b id="sIn">0장</b></div><div><span>원본 용량</span><b id="sO">0MB</b></div><div><span>압축 후</span><b id="sC">0MB</b></div></div>
<div id="status" class="status">대기 중</div><div class="prog"><div id="prog"></div></div>
</div></aside>
<section class="card"><div class="previewHead"><h2 id="title" style="padding:0;border:0">코스트코 세종점</h2><div class="scene"><button onclick="prev()">이전</button><span id="pageNo">1 / 1</span><button onclick="next()">다음</button><span id="cnt">배정 0장</span></div></div><div class="stage"><div id="sheet" class="sheet"></div></div></section>
</section>
</main>
<div id="print" class="printOnly"></div>
<script>
const M={"윤재경":["송도점","일산점","고척점","청라점","천안점"],"김현래":["하남점","상봉점","의정부점","양평점"],"조재현":["양재점","광명점","공세점","평택점"],"김영언":["세종점","대전점","대구점","혁신점"],"심창보":["부산점","울산점","김해점"]};
const C=[['TV','TV','(2단 집기)'],['REF','냉장고 / 김치냉장고 / 세건','(비네트/추가 진열)'],['AC','에어컨','(스탠드/벽걸이/창문형/시스템)'],['MON','모니터','(무빙스타일/게이밍)'],['COOK','조리기기','(큐커/인덕션/전자레인지/식기세척기)'],['ETC','기타 품목','(AV/청소기)']];
const DATA=Object.fromEntries(Object.values(M).flat().map(s=>[s,{pool:[],cat:Object.fromEntries(C.map(c=>[c[0],[]]))}]));
let mgr='김영언',st='세종점',page=0,dragId=null,dragFrom=null;
const $=id=>document.getElementById(id);init();
function init(){mgrSel();$('files').onchange=e=>{addFiles([...e.target.files],null);e.target.value=''};$('drop').onclick=()=>$('files').click();dropFiles($('drop'),fs=>addFiles(fs,null));poolDrop();document.addEventListener('paste',e=>{let fs=[...(e.clipboardData?.files||[])].filter(f=>f.type.startsWith('image/'));if(fs.length)addFiles(fs,null)});renderMgr()}
function mgrSel(){$('mgr').innerHTML=Object.keys(M).map(x=>`<option>${x}</option>`).join('');$('mgr').value=mgr;$('mgr').onchange=()=>{mgr=$('mgr').value;st=M[mgr][0];page=0;renderMgr()};$('store').onchange=()=>{st=$('store').value;page=0;render()}}
function renderMgr(){$('store').innerHTML=M[mgr].map(x=>`<option>${x}</option>`).join('');$('store').value=st;render()}
function selStore(x){st=x;$('store').value=x;page=0;render()}
function render(){let ms=M[mgr];$('tabs').innerHTML=ms.map(x=>`<button class="tab ${x==st?'on':''}" onclick="selStore('${x}')">${x.replace('점','')}</button>`).join('');$('info').textContent=` ${mgr} / 코스트코 ${st}`;$('title').textContent=`코스트코 ${st}`;let max=pages(st);if(page>=max)page=max-1;if(page<0)page=0;$('pageNo').textContent=`${page+1} / ${max}`;renderPool();renderSheet();summary()}
function renderSheet(){ $('sheet').innerHTML=sheetHtml(st,page,true); document.querySelectorAll('.slot').forEach(slotDrop); }
function sheetHtml(store,p,live){let heads=C.map(c=>`<th class="hd"><div class="m">${c[1]}</div><div class="s">${c[2]}</div></th>`).join('');let rows='';for(let r=0;r<3;r++){rows+=`<tr class="photoRow">${r==0?'<td rowspan="3" class="photoLab">현장\n사진</td>':''}`;for(let c of C){let ph=DATA[store].cat[c[0]][p*3+r];rows+=`<td>${slot(c[0],ph,live)}</td>`}rows+='</tr>'}return `<div class="top"><div class="store">코스트코 ${store}</div><div class="ttl">코스트코 진열·연출점검</div></div><table class="grid"><colgroup><col style="width:35.4px"><col span="6"></colgroup><tr><th class="lab">품목</th>${heads}</tr>${rows}<tr class="content"><td class="lab">내용</td><td></td><td></td><td></td><td></td><td></td><td></td></tr></table>`}
function slot(cat,p,live){if(!p)return `<div class="slot" ${live?`data-cat="${cat}"`:''}><span class="hint">사진 드래그</span></div>`;let img=live?thumb(p,cat):`<img src="${p.url}" style="width:100%;height:100%;object-fit:cover">`;return `<div class="slot" ${live?`data-cat="${cat}"`:''}>${img}</div>`}
function thumb(p,from){return `<div class="thumb" draggable="true" data-id="${p.id}" data-from="${from}"><img src="${p.url}"><span class="kb">${fmt(p.size)}</span><span class="x" data-del="${p.id}" data-from="${from}">×</span></div>`}
function renderPool(){let p=DATA[st].pool;$('pool').innerHTML=p.length?p.map(x=>thumb(x,'pool')).join(''):'<div class="empty">사진을 넣으면<br>여기에 대기 사진으로 표시됩니다.</div>'}
function dropFiles(el,cb){el.ondragover=e=>{e.preventDefault();el.classList.add('drag')};el.ondragleave=()=>el.classList.remove('drag');el.ondrop=e=>{e.preventDefault();el.classList.remove('drag');let fs=getFiles(e);if(fs.length)cb(fs)}}
function poolDrop(){dropFiles($('pool'),fs=>addFiles(fs,null));$('pool').ondrop=e=>{e.preventDefault();$('pool').classList.remove('drag');let fs=getFiles(e);if(fs.length){addFiles(fs,null);return}if(dragId)move(dragId,dragFrom,'pool')};document.addEventListener('dragstart',e=>{let t=e.target.closest?.('.thumb');if(!t)return;dragId=t.dataset.id;dragFrom=t.dataset.from;e.dataTransfer.setData('text/plain',dragId)});document.addEventListener('dragend',()=>{dragId=null;dragFrom=null});document.addEventListener('click',e=>{let x=e.target.closest?.('.x');if(!x)return;e.stopPropagation();remove(x.dataset.del,x.dataset.from);render()})}
function slotDrop(el){el.ondragover=e=>{e.preventDefault();el.classList.add('drag')};el.ondragleave=()=>el.classList.remove('drag');el.ondrop=e=>{e.preventDefault();el.classList.remove('drag');let fs=getFiles(e),cat=el.dataset.cat;if(fs.length){addFiles(fs,cat);return}if(dragId)move(dragId,dragFrom,cat)}}
function getFiles(e){return [...(e.dataTransfer?.files||[])].filter(f=>f.type.startsWith('image/'))}
async function addFiles(fs,cat){fs=fs.filter(f=>f.type.startsWith('image/'));if(!fs.length)return;let max=+$('max').value;$('status').textContent=`${st} 사진 압축 중...`;$('prog').style.width='0%';for(let i=0;i<fs.length;i++){let q=await squareImage(fs[i],max);let p={id:uid(),url:q.url,size:q.size,orig:fs[i].size};(cat?DATA[st].cat[cat]:DATA[st].pool).push(p);$('prog').style.width=Math.round((i+1)/fs.length*100)+'%'}render()}
function squareImage(file,max){return new Promise((res,rej)=>{let r=new FileReader();r.onload=()=>{let img=new Image();img.onload=()=>{let s=Math.min(img.width,img.height),sx=(img.width-s)/2,sy=(img.height-s)/2;let c=document.createElement('canvas');c.width=max;c.height=max;let ctx=c.getContext('2d');ctx.drawImage(img,sx,sy,s,s,0,0,max,max);let url=c.toDataURL('image/jpeg',.78);res({url,size:Math.round((url.split(',')[1]||'').length*3/4)})};img.onerror=rej;img.src=r.result};r.onerror=rej;r.readAsDataURL(file)})}
function move(id,from,to){if(from==to)return;let p=take(id,from);if(!p)return;(to=='pool'?DATA[st].pool:DATA[st].cat[to]).push(p);render()}
function take(id,from){let a=from=='pool'?DATA[st].pool:DATA[st].cat[from],i=a.findIndex(x=>x.id==id);return i>-1?a.splice(i,1)[0]:null}
function remove(id,from){take(id,from)}
function autoPut(){let d=DATA[st],i=0;while(d.pool.length){d.cat[C[i%C.length][0]].push(d.pool.shift());i++}render()}
function prev(){if(page>0){page--;render()}}function next(){if(page<pages(st)-1){page++;render()}}
function summary(){let d=DATA[st],ins=C.flatMap(c=>d.cat[c[0]]),all=[...d.pool,...ins],o=all.reduce((s,p)=>s+p.orig,0),co=all.reduce((s,p)=>s+p.size,0);$('sAll').textContent=all.length+'장';$('sIn').textContent=ins.length+'장';$('sO').textContent=fmt(o);$('sC').textContent=fmt(co);$('cnt').textContent=`배정 ${ins.length}장 / 대기 ${d.pool.length}장`;$('status').textContent=all.length?`현재 점포 ${all.length}장 / 사진은 PPT에서 4cm × 4cm 고정`:'대기 중'}
function pages(store){return Math.max(1,...C.map(c=>Math.ceil(DATA[store].cat[c[0]].length/3)))}
function assigned(store){return C.reduce((s,c)=>s+DATA[store].cat[c[0]].length,0)}
function fmt(b){if(!b)return'0MB';let m=b/1048576;return m>=1?m.toFixed(1)+'MB':Math.round(b/1024)+'KB'}function uid(){return crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random())}
function fileName(){let w=$('week').value.trim()||'W22',ss=M[mgr].map(x=>x.replace('점','')).join(', ');return `(CE)${w}_코스트코_진열연출점검_(${ss})`}
function printCurrent(){buildPrint([{s:st,p:page}]);setTimeout(()=>print(),100)}
function printAll(){let arr=[];for(let s of M[mgr].filter(x=>assigned(x)>0))for(let p=0;p<pages(s);p++)arr.push({s,p});if(!arr.length)return alert('PDF에 넣을 사진이 없습니다.');buildPrint(arr);setTimeout(()=>print(),100)}
function buildPrint(arr){$('print').innerHTML=arr.map(x=>`<div class="printPage"><div class="sheet">${sheetHtml(x.s,x.p,false)}</div></div>`).join('')}

/* ===================== PPTX 생성부: 외부 라이브러리 없음 ===================== */
const EMU_PER_CM=360000, SLIDE_W=33.8666667, SLIDE_H=19.05, PIC=4.0;
const emu=cm=>Math.round(cm*EMU_PER_CM), esc=s=>String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
async function makePpt(){try{let stores=M[mgr].filter(x=>assigned(x)>0);if(!stores.length)return alert('배정된 사진이 없습니다.');let files=buildPptx(stores);downloadBlob(zipStore(files),fileName()+'.pptx','application/vnd.openxmlformats-officedocument.presentationml.presentation');$('status').textContent='PPT 다운로드 완료';}catch(e){console.error(e);alert('PPT 생성 오류: '+(e.message||e))}}
function buildPptx(stores){let slides=[],media=[],slideNo=1;for(let s of stores){for(let p=0;p<pages(s);p++){let imgRels=[];let xml=slideXml(s,p,slideNo,imgRels,media);slides.push({xml,rels:slideRelXml(imgRels)});slideNo++}}let files=[];files.push({name:'[Content_Types].xml',text:contentTypes(slides.length)});files.push({name:'_rels/.rels',text:rootRels()});files.push({name:'docProps/core.xml',text:coreXml()});files.push({name:'docProps/app.xml',text:appXml(slides.length)});files.push({name:'ppt/presentation.xml',text:presentationXml(slides.length)});files.push({name:'ppt/_rels/presentation.xml.rels',text:presentationRels(slides.length)});files.push({name:'ppt/slideMasters/slideMaster1.xml',text:slideMasterXml()});files.push({name:'ppt/slideMasters/_rels/slideMaster1.xml.rels',text:slideMasterRels()});files.push({name:'ppt/slideLayouts/slideLayout1.xml',text:slideLayoutXml()});files.push({name:'ppt/slideLayouts/_rels/slideLayout1.xml.rels',text:slideLayoutRels()});files.push({name:'ppt/theme/theme1.xml',text:themeXml()});slides.forEach((s,i)=>{files.push({name:`ppt/slides/slide${i+1}.xml`,text:s.xml});files.push({name:`ppt/slides/_rels/slide${i+1}.xml.rels`,text:s.rels})});media.forEach((m,i)=>files.push({name:`ppt/media/image${i+1}.jpg`,bytes:m.bytes}));return files}
function slideXml(store,p,idx,imgRels,media){let id=2;let out=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><p:sld xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main"><p:cSld><p:spTree>${grp()}`;
function rect(x,y,w,h,fill='FFFFFF',line='222222'){out+=`<p:sp><p:nvSpPr><p:cNvPr id="${id++}" name="Rect"/><p:cNvSpPr/><p:nvPr/></p:nvSpPr><p:spPr><a:xfrm><a:off x="${emu(x)}" y="${emu(y)}"/><a:ext cx="${emu(w)}" cy="${emu(h)}"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom><a:solidFill><a:srgbClr val="${fill}"/></a:solidFill><a:ln w="9525"><a:solidFill><a:srgbClr val="${line}"/></a:solidFill></a:ln></p:spPr></p:sp>`}
function text(x,y,w,h,t,sz=9,b=1,color='111111',fill=null,align='ctr',under=false){if(fill)rect(x,y,w,h,fill);out+=`<p:sp><p:nvSpPr><p:cNvPr id="${id++}" name="Text"/><p:cNvSpPr txBox="1"/><p:nvPr/></p:nvSpPr><p:spPr><a:xfrm><a:off x="${emu(x)}" y="${emu(y)}"/><a:ext cx="${emu(w)}" cy="${emu(h)}"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom><a:noFill/><a:ln><a:noFill/></a:ln></p:spPr><p:txBody><a:bodyPr wrap="square" anchor="ctr"/><a:lstStyle/>`;String(t).split('\n').forEach(part=>{out+=`<a:p><a:pPr algn="${align}"/><a:r><a:rPr lang="ko-KR" sz="${sz*100}" ${b?'b="1"':''} ${under?'u="sng"':''}><a:solidFill><a:srgbClr val="${color}"/></a:solidFill><a:latin typeface="Malgun Gothic"/><a:ea typeface="Malgun Gothic"/></a:rPr><a:t>${esc(part)}</a:t></a:r></a:p>`});out+=`</p:txBody></p:sp>`}
