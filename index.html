<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>코스트코 진열·연출 점검 PPT 생성기</title>
  <style>
    :root{--bg:#f3f5f9;--card:#fff;--line:#cfd7e6;--text:#111827;--muted:#667085;--primary:#111827;--blue:#1d4ed8;--danger:#dc2626;--soft:#eef2ff;--navy:#172033;--head:#d9d9d9;--grid:#222}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,"Malgun Gothic","Noto Sans KR",sans-serif;background:var(--bg);color:var(--text)}
    header{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);padding:14px 20px}
    h1{margin:0;font-size:22px;letter-spacing:-.5px} header p{margin:5px 0 0;color:var(--muted);font-size:13px}
    main{max-width:1560px;margin:0 auto;padding:16px}
    .toolbar{display:grid;grid-template-columns:.55fr .7fr .7fr .85fr .65fr auto auto;gap:10px;align-items:end;background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 8px 22px rgba(15,23,42,.06);margin-bottom:12px}
    label{display:flex;flex-direction:column;gap:6px;color:var(--muted);font-size:12px;font-weight:800}
    input,select{min-height:38px;border:1px solid var(--line);border-radius:10px;padding:0 10px;background:#fff;color:var(--text);font-size:14px;font-family:inherit;max-width:100%}
    input[type=file]{padding:8px 10px;font-size:12px}
    button{border:0;border-radius:11px;padding:11px 14px;cursor:pointer;font-weight:900;font-size:14px;white-space:nowrap;font-family:inherit}
    button.primary{background:var(--primary);color:#fff}button.blue{background:var(--blue);color:#fff}button.ghost{background:var(--soft);color:#1e40af}button.danger{background:#fee2e2;color:var(--danger)}button.small{padding:6px 9px;font-size:12px;border-radius:8px}
    .sticky-actions{position:fixed;right:18px;bottom:18px;z-index:30;display:flex;gap:8px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px;box-shadow:0 10px 28px rgba(15,23,42,.18)}
    .tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}.tab{background:#fff;color:#334155;border:1px solid var(--line);padding:9px 13px;border-radius:999px}.tab.active{background:#172033;border-color:#172033;color:#fff}
    .notice{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:13px;padding:11px 13px;font-size:13px;line-height:1.55;margin-bottom:12px}
    .layout{display:grid;grid-template-columns:360px 1fr;gap:14px;align-items:start}.panel,.ppt-wrap{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 8px 22px rgba(15,23,42,.05);overflow:hidden}
    .panel-head,.ppt-title{padding:13px 15px;border-bottom:1px solid var(--line);background:#fbfcff;display:flex;justify-content:space-between;align-items:center;gap:10px}.panel-head strong,.ppt-title h2{font-size:17px;margin:0}.panel-head span,.ppt-title span{color:var(--muted);font-size:12px}.panel-body{padding:14px}
    .drop{min-height:142px;border:2px dashed #94a3b8;background:#f8fafc;border-radius:16px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:16px;color:var(--muted);cursor:pointer;margin-bottom:12px}.drop strong{color:var(--text);font-size:18px;margin-bottom:6px}.dragover{outline:3px solid #93c5fd!important;background:#eff6ff!important;color:#1e40af!important}.drop input{display:none}
    .pool{min-height:210px;max-height:430px;overflow:auto;border:2px dashed #d8dfeb;background:#fcfdff;border-radius:14px;padding:10px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.pool-empty{grid-column:1/-1;display:flex;align-items:center;justify-content:center;min-height:150px;color:#98a2b3;font-size:13px;text-align:center;line-height:1.5}
    .thumb{position:relative;aspect-ratio:1/1;border:1px solid var(--line);border-radius:7px;overflow:hidden;background:#fff;cursor:grab}.thumb img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}.thumb .tag{position:absolute;left:4px;top:4px;background:rgba(15,23,42,.82);color:#fff;border-radius:999px;padding:2px 6px;font-size:10px}.thumb .x{position:absolute;right:4px;top:4px;width:21px;height:21px;border-radius:999px;background:rgba(220,38,38,.92);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer}
    .summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.summary div{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:9px}.summary span{display:block;color:var(--muted);font-size:11px;margin-bottom:4px}.summary strong{font-size:15px}.status{color:var(--muted);font-size:13px;margin-top:10px;line-height:1.5}.progress{width:100%;height:8px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:8px}.progress>div{height:100%;width:0%;background:#2563eb;transition:width .2s ease}
    .ppt-stage{padding:16px;overflow:auto}.scene-nav{display:flex;gap:7px;align-items:center}
    .ppt-sheet{width:1200px;height:675px;background:#fff;border:1px solid #111;transform-origin:top left;overflow:hidden}
    .topbar{height:32px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 8px;font-weight:900}
    .topbar .store{font-size:23px;text-decoration:underline;text-underline-offset:3px}.topbar .title{font-size:17px}
    table.check-table{border-collapse:collapse;table-layout:fixed;width:100%;height:643px;font-size:13px}.check-table th,.check-table td{border:1.5px solid var(--grid);vertical-align:middle;text-align:center;padding:0}.check-table .label{width:41.4px;background:var(--head);font-weight:900;color:#111}.check-table .head{height:47px;background:var(--head);font-weight:900;line-height:1.22}.check-table .head .main{font-size:12px;color:#111}.check-table .head .sub{font-size:11px;color:#1f5aa6;text-decoration:underline;font-weight:900}.check-table .photo-label{background:var(--head);font-weight:900;white-space:pre-line;line-height:1.25}.check-table .photo-row{height:490px}.check-table .content-row{height:106px;background:#f3f3f3}.check-table .content-label{background:var(--head);font-weight:900}
    .category-drop{height:490px;background:#fff;padding:6px;display:flex;align-items:flex-start;justify-content:center}
    .photo-grid{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:6px;align-content:start}
    .photo-box{aspect-ratio:1/1;border:1px dashed #d1d5db;background:#fafafa;border-radius:4px;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#a3aab8;font-size:11px}
    .photo-box .thumb{width:100%;height:100%;border:0;border-radius:0}.print-pages{display:none}
    @media(max-width:1100px){.toolbar{grid-template-columns:1fr 1fr}.layout{grid-template-columns:1fr}.sticky-actions{left:10px;right:10px;justify-content:center}.ppt-sheet{transform:scale(.78);transform-origin:top left}.ppt-stage{height:560px}}
    @media print{
      html,body{background:#fff!important;margin:0!important;padding:0!important;width:297mm;height:auto;-webkit-print-color-adjust:exact;print-color-adjust:exact}
      header,main,.sticky-actions{display:none!important}
      .print-pages{display:block!important;position:absolute;left:0;top:0;width:297mm;background:#fff}
      .print-sheet{width:297mm;height:210mm;page-break-after:always;break-after:page;display:flex;align-items:center;justify-content:center;background:#fff;overflow:hidden}
      .print-sheet .ppt-sheet{width:297mm;height:167.06mm;border:0;box-shadow:none;transform:none}
      .print-sheet .topbar{height:8mm}.print-sheet table.check-table{height:159.06mm}.print-sheet .category-drop{height:115mm}.print-sheet .check-table .photo-row{height:115mm}.print-sheet .check-table .content-row{height:27mm}
      @page{size:A4 landscape;margin:0}
    }
  </style>
</head>
<body>
  <header><h1>코스트코 진열·연출 점검 PPT 생성기</h1><p>담당 선택 → 점포 선택 → PPT 양식 확인 → 사진 업로드 → 위치 배정 → PPT/PDF 생성</p></header>
  <main>
    <section class="toolbar">
      <label>보고 주차<input id="weekInput" value="W22" /></label>
      <label>담당<select id="managerSelect"></select></label>
      <label>현재 점포<select id="storeSelect"></select></label>
      <label>PPT 양식 업로드<input id="templateInput" type="file" accept=".pptx" /></label>
      <label>사진 압축<select id="maxSize"><option value="600">600px / 가볍게</option><option value="800" selected>800px / 추천</option><option value="1000">1000px / 선명도</option></select></label>
      <button class="ghost" onclick="autoDistribute()">대기사진 자동배치</button>
      <button class="primary" onclick="makePpt()">PPT 생성</button>
    </section>
    <div id="storeTabs" class="tabs"></div>
    <p class="notice"><b>수정 버전:</b> PPT 생성은 외부 라이브러리 없이 <b>index.html 하나만</b>으로 작동합니다. 사진은 품목별 <b>정사각형 4칸(2×2)</b>으로 들어갑니다. PDF 저장은 인쇄창에서 <b>대상: PDF로 저장</b>, 여백 없음, 컬러로 저장하세요.</p>
    <section class="layout">
      <aside class="panel">
        <div class="panel-head"><div><strong>사진 대기함</strong><br><span id="activeInfo">-</span></div><button class="danger small" onclick="clearPool()">대기함 비우기</button></div>
        <div class="panel-body">
          <label class="drop" id="uploadDrop"><input type="file" id="fileInput" multiple accept="image/*"><strong>사진을 여기에 넣기</strong>드래그가 안 되면 여기를 클릭해서 선택<br>복사한 사진은 Ctrl+V도 가능</label>
          <div class="pool" id="photoPool"></div>
          <div class="summary"><div><span>현재 점포 전체</span><strong id="sumCurrent">0장</strong></div><div><span>배정 완료</span><strong id="sumAssigned">0장</strong></div><div><span>원본 용량</span><strong id="sumOriginal">0MB</strong></div><div><span>압축 후</span><strong id="sumCompressed">0MB</strong></div></div>
          <div class="status" id="templateStatus">PPT 양식: 미업로드</div>
          <div class="status" id="statusText">대기 중</div><div class="progress"><div id="progressBar"></div></div>
        </div>
      </aside>
      <section class="ppt-wrap">
        <div class="ppt-title"><h2 id="pptStoreTitle">코스트코 세종점</h2><div class="scene-nav"><button class="ghost small" onclick="prevScene()">이전</button><span id="sceneInfo">1 / 1</span><button class="ghost small" onclick="nextScene()">다음</button><span id="pptCountText">배정 0장</span></div></div>
        <div class="ppt-stage"><div id="pdfScene" class="ppt-sheet"></div></div>
      </section>
    </section>
  </main>
  <div class="sticky-actions"><button class="ghost" onclick="printCurrentPdf()">현재 PDF 저장</button><button class="blue" onclick="printAllPdf()">담당 전체 PDF 저장</button><button class="primary" onclick="makePpt()">PPT 생성</button></div>
  <div id="printPages" class="print-pages"></div>
<script>
const MANAGER_STORES={"윤재경":["송도점","일산점","고척점","청라점","천안점"],"김현래":["하남점","상봉점","의정부점","양평점"],"조재현":["양재점","광명점","공세점","평택점"],"김영언":["세종점","대전점","대구점","혁신점"],"심창보":["부산점","울산점","김해점"]};
const CATEGORIES=[
  {key:"TV",main:"TV",sub:"(2단 집기)",ppt:"TV\n(2단 집기)"},
  {key:"REF",main:"냉장고 / 김치냉장고 / 세건",sub:"(비네트/추가 진열)",ppt:"냉장고 / 김치냉장고 / 세건\n(비네트/추가 진열)"},
  {key:"AC",main:"에어컨",sub:"(스탠드/벽걸이/창문형/시스템)",ppt:"에어컨\n(스탠드/벽걸이/창문형/시스템)"},
  {key:"MONITOR",main:"모니터",sub:"(무빙스타일/게이밍)",ppt:"모니터\n(무빙스타일/게이밍)"},
  {key:"COOK",main:"조리기기",sub:"(큐커/인덕션/전자레인지/식기세척기)",ppt:"조리기기\n(큐커/인덕션/전자레인지/식기세척기)"},
  {key:"ETC",main:"기타 품목",sub:"(AV/청소기)",ppt:"기타 품목\n(AV/청소기)"}
];
const ALL_STORES=Object.values(MANAGER_STORES).flat();
const storeData=Object.fromEntries(ALL_STORES.map(s=>[s,{pool:[],categories:Object.fromEntries(CATEGORIES.map(c=>[c.key,[]]))}]));
let currentManager="김영언",currentStore="세종점",currentPage=0,draggedPhotoId=null,draggedFrom=null,templateName="";
const $=id=>document.getElementById(id);
const managerSelect=$("managerSelect"),storeSelect=$("storeSelect"),storeTabs=$("storeTabs"),photoPool=$("photoPool"),statusText=$("statusText"),progressBar=$("progressBar"),fileInput=$("fileInput"),templateInput=$("templateInput");
init();
function init(){
  managerSelect.innerHTML=Object.keys(MANAGER_STORES).map(n=>`<option>${n}</option>`).join("");
  managerSelect.value=currentManager;
  managerSelect.onchange=()=>{currentManager=managerSelect.value;currentStore=MANAGER_STORES[currentManager][0];currentPage=0;renderManager()};
  storeSelect.onchange=()=>{currentStore=storeSelect.value;currentPage=0;renderAll()};
  fileInput.onchange=e=>{handleFiles([...e.target.files],null);fileInput.value=""};
  templateInput.onchange=e=>{const f=e.target.files?.[0];templateName=f?f.name:"";$("templateStatus").textContent=templateName?`PPT 양식: ${templateName} 확인됨`:"PPT 양식: 미업로드"};
  setupExternalDrop($("uploadDrop"),files=>handleFiles(files,null));
  $("uploadDrop").addEventListener("click",()=>fileInput.click());
  setupPoolDrop();
  document.addEventListener("paste",e=>{const files=[...(e.clipboardData?.files||[])].filter(f=>f.type.startsWith("image/"));if(files.length)handleFiles(files,null)});
  renderManager();
}
function renderManager(){const stores=MANAGER_STORES[currentManager];storeSelect.innerHTML=stores.map(s=>`<option>${s}</option>`).join("");storeSelect.value=currentStore;renderAll()}
function selectStore(s){currentStore=s;storeSelect.value=s;currentPage=0;renderAll()}
function renderAll(){
  const stores=MANAGER_STORES[currentManager];
  storeTabs.innerHTML=stores.map(s=>`<button class="tab ${s===currentStore?'active':''}" onclick="selectStore('${s}')">${s.replace('점','')}</button>`).join("");
  $("activeInfo").textContent=`${currentManager} 담당 / 코스트코 ${currentStore}`;
  $("pptStoreTitle").textContent=`코스트코 ${currentStore}`;
  const maxPages=getStorePageCount(currentStore);if(currentPage>=maxPages)currentPage=maxPages-1;if(currentPage<0)currentPage=0;
  $("sceneInfo").textContent=`${currentPage+1} / ${maxPages}`;
  renderPool();renderPreview();updateSummary();
}
function renderPreview(){
  $("pdfScene").innerHTML=sheetHtml(currentStore,currentPage,true);
  document.querySelectorAll(".category-drop").forEach(slot=>setupCategoryDrop(slot));
}
function sheetHtml(store,page,interactive){
  const head=CATEGORIES.map(c=>`<th class="head"><div class="main">${esc(c.main)}</div><div class="sub">${esc(c.sub)}</div></th>`).join("");
  const cells=CATEGORIES.map(c=>{
    const photos=storeData[store].categories[c.key].slice(page*4,page*4+4);
    return `<td><div class="category-drop" ${interactive?`data-category="${c.key}"`:""}><div class="photo-grid">${[0,1,2,3].map(i=>boxHtml(c.key,photos[i],interactive)).join("")}</div></div></td>`;
  }).join("");
  return `<div class="topbar"><div class="store">코스트코 ${esc(store)}</div><div class="title">코스트코 진열·연출점검</div></div>
    <table class="check-table"><colgroup><col style="width:41.4px"><col span="6"></colgroup>
    <tr><th class="label">품목</th>${head}</tr>
    <tr class="photo-row"><td class="photo-label">현장\n사진</td>${cells}</tr>
    <tr class="content-row"><td class="content-label">내용</td><td></td><td></td><td></td><td></td><td></td><td></td></tr></table>`;
}
function boxHtml(cat,p,interactive){
  if(!p)return `<div class="photo-box">${interactive?"사진":" "}</div>`;
  if(!interactive)return `<div class="photo-box"><img src="${p.dataUrl}" style="width:100%;height:100%;object-fit:cover"></div>`;
  return `<div class="photo-box">${thumbHtml(p,cat)}</div>`;
}
function thumbHtml(p,from){return `<div class="thumb" draggable="true" data-id="${p.id}" data-from="${from}"><img src="${p.dataUrl}"><span class="tag">${formatBytes(p.compressedSize)}</span><span class="x" data-del="${p.id}" data-from="${from}">×</span></div>`}
function setupCategoryDrop(slot){
  slot.addEventListener("dragover",e=>{e.preventDefault();slot.classList.add("dragover")});
  slot.addEventListener("dragleave",()=>slot.classList.remove("dragover"));
  slot.addEventListener("drop",e=>{e.preventDefault();slot.classList.remove("dragover");const files=getFiles(e);const cat=slot.dataset.category;if(files.length){handleFiles(files,cat);return}if(draggedPhotoId)movePhoto(draggedPhotoId,draggedFrom,cat)});
}
function setupExternalDrop(el,onFiles){el.addEventListener("dragover",e=>{e.preventDefault();el.classList.add("dragover")});el.addEventListener("dragleave",()=>el.classList.remove("dragover"));el.addEventListener("drop",e=>{e.preventDefault();el.classList.remove("dragover");const files=getFiles(e);if(!files.length)return alert("사진 파일로 인식되지 않았습니다. 클릭해서 파일 선택으로 넣어보세요.");onFiles(files)})}
function setupPoolDrop(){
  photoPool.addEventListener("dragover",e=>{e.preventDefault();photoPool.classList.add("dragover")});
  photoPool.addEventListener("dragleave",()=>photoPool.classList.remove("dragover"));
  photoPool.addEventListener("drop",e=>{e.preventDefault();photoPool.classList.remove("dragover");const files=getFiles(e);if(files.length){handleFiles(files,null);return}if(draggedPhotoId)movePhoto(draggedPhotoId,draggedFrom,"pool")});
  document.addEventListener("dragstart",e=>{const t=e.target.closest?.(".thumb");if(!t)return;draggedPhotoId=t.dataset.id;draggedFrom=t.dataset.from;e.dataTransfer.setData("text/plain",draggedPhotoId)});
  document.addEventListener("dragend",()=>{draggedPhotoId=null;draggedFrom=null});
  document.addEventListener("click",e=>{const x=e.target.closest?.(".x");if(!x)return;e.stopPropagation();deletePhoto(x.dataset.del,x.dataset.from)});
}
function getFiles(e){const f=[...(e.dataTransfer?.files||[])].filter(x=>x.type.startsWith("image/"));if(f.length)return f;return [...(e.dataTransfer?.items||[])].filter(i=>i.kind==="file").map(i=>i.getAsFile()).filter(x=>x&&x.type.startsWith("image/"))}
async function handleFiles(files,targetCat){
  try{files=files.filter(f=>f.type.startsWith("image/"));if(!files.length)return;const maxSize=Number($("maxSize").value);statusText.textContent=`${currentStore} 사진 정사각형 압축 중...`;progressBar.style.width="0%";
    for(let i=0;i<files.length;i++){const compressed=await squareImage(files[i],maxSize,.74);const p={id:randomId(),dataUrl:compressed.dataUrl,w:1,h:1,originalName:files[i].name||"사진",originalSize:files[i].size||0,compressedSize:compressed.size};if(targetCat)storeData[currentStore].categories[targetCat].push(p);else storeData[currentStore].pool.push(p);progressBar.style.width=`${Math.round((i+1)/files.length*100)}%`;}
    renderAll();
  }catch(err){showError(err)}
}
function squareImage(file,size,quality){return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{const c=document.createElement("canvas");c.width=size;c.height=size;const ctx=c.getContext("2d");const scale=Math.max(size/img.width,size/img.height);const sw=size/scale,sh=size/scale,sx=(img.width-sw)/2,sy=(img.height-sh)/2;ctx.drawImage(img,sx,sy,sw,sh,0,0,size,size);const dataUrl=c.toDataURL("image/jpeg",quality);resolve({dataUrl,w:size,h:size,size:estimate(dataUrl)})};img.onerror=reject;img.src=r.result};r.onerror=reject;r.readAsDataURL(file)})}
function renderPool(){const pool=storeData[currentStore].pool;photoPool.innerHTML="";if(!pool.length){photoPool.innerHTML='<div class="pool-empty">사진을 넣으면<br>여기에 대기 사진으로 표시됩니다.</div>';return}pool.forEach(p=>{const wrap=document.createElement("div");wrap.innerHTML=thumbHtml(p,"pool");photoPool.appendChild(wrap.firstChild)})}
function movePhoto(id,from,to){if(from===to)return;const p=removePhoto(id,from);if(!p)return;if(to==="pool")storeData[currentStore].pool.push(p);else storeData[currentStore].categories[to].push(p);renderAll()}
function removePhoto(id,from){const arr=from==="pool"?storeData[currentStore].pool:storeData[currentStore].categories[from];const idx=arr.findIndex(p=>p.id===id);return idx>=0?arr.splice(idx,1)[0]:null}
function deletePhoto(id,from){removePhoto(id,from);renderAll()}
function clearPool(){storeData[currentStore].pool=[];renderAll()}

async function makePpt(){
  try{
    const stores=MANAGER_STORES[currentManager].filter(s=>assignedCount(s)>0);
    if(!stores.length)return alert("배정된 사진이 없습니다. 대기 사진을 오른쪽 품목 칸으로 먼저 옮겨주세요.");
    const unassigned=MANAGER_STORES[currentManager].reduce((sum,s)=>sum+storeData[s].pool.length,0);
    if(unassigned&&!confirm(`대기 사진 ${unassigned}장은 PPT에 들어가지 않습니다. 그대로 생성할까요?`))return;

    const slides=[];for(const s of stores){for(let p=0;p<getStorePageCount(s);p++)slides.push({store:s,page:p})}

function assignedCount(store){return CATEGORIES.reduce((sum,c)=>sum+storeData[store].categories[c.key].length,0)}
function getStorePageCount(store){return Math.max(1,...CATEGORIES.map(c=>Math.ceil(storeData[store].categories[c.key].length/4)))}
function fileBaseName(){const week=$("weekInput").value.trim()||"W22";const stores=MANAGER_STORES[currentManager].map(s=>s.replace("점","")).join(", ");return `(CE)${week}_코스트코_진열연출점검_(${stores})`}
function estimate(dataUrl){const b=dataUrl.split(",")[1]||"";return Math.round(b.length*3/4)}
function formatBytes(bytes){if(!bytes)return"0MB";const mb=bytes/1024/1024;return mb>=1?`${mb.toFixed(1)}MB`:`${Math.round(bytes/1024)}KB`}
function randomId(){return crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random())}
function wait(ms){return new Promise(r=>setTimeout(r,ms))}
function showError(err){console.error(err);progressBar.style.width="0%";statusText.textContent="오류: "+(err?.message||err);alert("오류가 발생했습니다.\n\n"+(err?.message||err))}
</script>
